<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark List | My Links</title>
    <meta name="description" content="Kumpulan tautan penting untuk akses cepat.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #D1E9F6;
            --primary-blue: #10375C;
            --accent-blue: #4C8CBF;
            --text-primary: #10375C;
            --text-secondary: #4A6276;
            --card-bg: #FFFFFF;
            --card-border: rgba(16, 55, 92, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #E3F2FD, transparent 70%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.8s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .bookmark-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bookmark {
            display: flex;
            align-items: center;
            text-decoration: none;
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 16px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 12px rgba(16, 55, 92, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bookmark-icon {
            width: 40px;
            height: 40px;
            background: rgba(76, 140, 191, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 1.2rem;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        .bookmark:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(16, 55, 92, 0.1);
            border-color: var(--accent-blue);
        }

        .bookmark:hover .bookmark-icon {
            background: var(--accent-blue);
            color: white;
        }

        .bookmark:active {
            transform: scale(0.98);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .logo {
                font-size: 1.75rem;
            }

            .bookmark {
                padding: 14px 18px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="bookmark-list">

            <a class="bookmark" href="https://www.akun.vip/dana/" target="_blank">
                <div class="bookmark-icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <span>List Dana</span>
            </a>

            <a class="bookmark" href="https://core.akun.vip/html/catatan.html" target="_blank">
                <div class="bookmark-icon">
                    <i class="fas fa-sticky-note"></i>
                </div>
                <span>Catatan</span>
            </a>

        </div>

        <footer>
            <p>&copy; 2026 Sirhuka Store</p>
        </footer>
    </div>

</body>

</html>
