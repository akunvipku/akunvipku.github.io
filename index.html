<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Website Pindah - Digital Shopee</title>
  <link rel="icon" href="../public/assets/img/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../public/assets/img/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fef9f0;
      --warm: #fff3e3;
      --card: #ffffff;
      --ink: #24130e;
      --body: #4b3528;
      --muted: #876f60;
      --line: #ead8c3;
      --red: #e50914;
      --orange: #ee4d2d;
      --shadow: 0 22px 58px rgba(74, 53, 40, .14);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 12% 10%, rgba(238, 77, 45, .16), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(229, 9, 20, .12), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--warm));
      color: var(--body);
      font-family: "Nunito", -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.65;
    }

    a { color: inherit; text-decoration: none; }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .card {
      width: min(760px, 100%);
      position: relative;
      overflow: hidden;
      border: 1.5px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 255, 255, .88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: clamp(26px, 5vw, 46px);
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 7px;
      background: linear-gradient(90deg, var(--orange), var(--red));
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      padding: 12px 16px;
      border: 1px solid rgba(234, 216, 195, .82);
      border-radius: 18px;
      background: #fffaf4;
    }

    .logo img {
      display: block;
      width: min(260px, 72vw);
      height: auto;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      padding: 7px 13px;
      border-radius: 999px;
      background: #fff0ee;
      color: var(--orange);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--ink);
      font-family: "Fredoka One", "Nunito", sans-serif;
      font-size: clamp(38px, 7vw, 64px);
      line-height: 1.02;
      letter-spacing: -.02em;
    }

    .red { color: var(--red); }

    .lede {
      max-width: 590px;
      margin: 0 auto 22px;
      color: var(--body);
      font-size: clamp(17px, 2vw, 21px);
      font-weight: 800;
    }

    .url-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      max-width: 100%;
      margin: 0 auto 22px;
      padding: 12px 16px;
      border: 1.5px dashed #f1b3aa;
      border-radius: 16px;
      background: #fff5f3;
      color: var(--ink);
      font-size: clamp(18px, 3vw, 25px);
      font-weight: 950;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 20px;
      border: 0;
      border-radius: 12px;
      color: #fff;
      background: var(--orange);
      font-size: 15px;
      font-weight: 950;
      box-shadow: 0 10px 24px rgba(238, 77, 45, .24);
      transition: transform .18s ease, filter .18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: saturate(1.08);
    }

    .note {
      margin: 24px auto 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    @media (max-width: 520px) {
      .page { padding: 18px 12px; }
      .card { border-radius: 22px; }
      .actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="title">
      <a class="logo" href="https://digitalshopee.com/" aria-label="Buka Digital Shopee">
        <img src="../public/assets/img/digital-shopee-logo.png" alt="Digital Shopee">
      </a>
      <div class="eyebrow">Informasi Website</div>
      <h1 id="title">Website sudah <span class="red">pindah</span></h1>
      <p class="lede">Halaman akun VIP dan informasi produk sekarang tersedia di alamat resmi Digital Shopee.</p>
      <div class="url-box" aria-label="Alamat website baru">digitalshopee.com</div>
      <div class="actions">
        <a class="btn" href="https://digitalshopee.com/">Buka Digital Shopee</a>
      </div>
      <p class="note">Silakan simpan alamat baru agar tidak salah membuka halaman lama.</p>
    </section>
  </main>
</body>
</html>
