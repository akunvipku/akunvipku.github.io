```html
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Link Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-generate {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        }

        .btn-generate:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        textarea {
            width: 100%;
            height: 140px;
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            transition: border-color 0.2s;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .btn-copy {
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-copy.success {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            animation: slideUp 0.3s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            font-weight: 500;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast-icon {
            color: var(--success);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Link Generator</h1>
        <p class="subtitle">Generate dynamic DANA IPG links securely</p>

        <button class="btn-generate" onclick="generateLink()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                <path d="M3 22v-6h6"></path>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            </svg>
            Generate New Link
        </button>

        <textarea id="result" readonly placeholder="Your generated link will appear here..."></textarea>

        <button id="copyBtn" class="btn-copy" onclick="copyLink()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copy to Clipboard
        </button>

        <button id="openBtn" class="btn-copy" onclick="openLink()" style="margin-top: 12px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            Open in New Tab
        </button>

        <div class="footer">
            &copy; 2024 Premium Link Engine
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        function randHex(length) {
            const chars = "0123456789abcdef";
            let result = "";
            for (let i = 0; i < length; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return result;
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <span class="toast-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </span>
                <span>${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px) translateX(-50%)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function generateLink() {
            const externalId = randHex(14) + "T" + Date.now();
            const state = randHex(12);
            const trackId = randHex(16);
            const timestamp = new Date().toISOString();

            const params = new URLSearchParams({
                channelId: "WEB",
                externalId: externalId,
                partnerId: "2018080841488945368353",
                redirectUrl: "https://www.vidio.com",
                scopes: "DEFAULT_BASIC_PROFILE,QUERY_BALANCE,CASHIER,MINI_DANA,PUBLIC_ID,AGREEMENT_PAY",
                state: state,
                timestamp: timestamp,
                isSnapBI: "true",
                trackId: trackId
            });

            const ipgForwardUrl = encodeURIComponent("/n/ipg/oauth?" + params.toString());
            const finalUrl = "https://m.dana.id/n/ipg/new/inputphone?ipgForwardUrl=" + ipgForwardUrl + "&trackId=" + trackId;

            document.getElementById("result").value = finalUrl;
            showToast("Link successfully generated!");

            // Reset copy button state
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.classList.remove('success');
            copyBtn.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy to Clipboard
            `;
        }

        async function copyLink() {
            const textarea = document.getElementById("result");
            const text = textarea.value;

            if (!text) {
                showToast("Please generate a link first!");
                return;
            }

            try {
                await navigator.clipboard.writeText(text);

                const copyBtn = document.getElementById('copyBtn');
                copyBtn.classList.add('success');
                copyBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Copied!
                `;

                showToast("Link copied to clipboard");
            } catch (err) {
                console.error("Failed to copy: ", err);
                // Fallback for older browsers
                textarea.select();
                document.execCommand("copy");
                showToast("Link copied to clipboard");
            }
        }

        function openLink() {
            const url = document.getElementById("result").value;
            if (url) {
                window.open(url, '_blank');
            } else {
                showToast("Please generate a link first!");
            }
        }

        // Auto generate when page loads
        window.onload = generateLink;
    </script>

</body>

</html>
