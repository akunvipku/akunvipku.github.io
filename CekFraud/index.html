<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CekFraud — Digital Identity Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #131825;
      --surface2: #1a2035;
      --border: #1e2a42;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --green: #10b981;
      --green-dim: rgba(16, 185, 129, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);
      --orange: #f59e0b;
      --orange-dim: rgba(245, 158, 11, 0.12);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ─── */
    .app { max-width: 960px; margin: 0 auto; padding: 32px 20px 120px; }

    /* ─── Header ─── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      display: flex; align-items: center; justify-content: center;
    }
    .logo h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .logo h1 span { color: var(--accent); }
    .header-actions { display: flex; align-items: center; gap: 16px; }
    .dev-badge {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 6px; cursor: pointer;
      transition: 0.2s; user-select: none;
    }
    .dev-badge.active { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }

    /* ─── Score Hero ─── */
    .score-hero {
      display: grid; grid-template-columns: 1fr 200px; gap: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .score-hero::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }
    .score-info h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px; }
    .visitor-id { font-size: 15px; font-weight: 600; color: var(--accent); word-break: break-all; margin-bottom: 16px; }
    .meta-row { display: flex; gap: 24px; flex-wrap: wrap; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-item label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); font-weight: 600; }
    .meta-item span { font-size: 13px; font-weight: 500; }
    .score-ring {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .ring-wrap { position: relative; width: 120px; height: 120px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-label {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-label .num { font-size: 32px; font-weight: 800; line-height: 1; }
    .ring-label .sub { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

    /* ─── Threat Cards ─── */
    .section-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label .dot { width: 6px; height: 6px; border-radius: 50%; }
    .section-label .dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .section-label .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }

    .threat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .threat-card {
      background: var(--red-dim); border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius); padding: 16px; cursor: pointer;
      transition: 0.2s; position: relative; overflow: hidden;
    }
    .threat-card:hover { border-color: var(--red); transform: translateY(-2px); }
    .threat-card .tc-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(239, 68, 68, 0.15); display: flex;
      align-items: center; justify-content: center; margin-bottom: 10px;
      color: var(--red);
    }
    .threat-card .tc-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .threat-card .tc-status { font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: 0.04em; }
    .threat-card .tc-detail {
      display: none; margin-top: 12px; padding-top: 12px;
      border-top: 1px solid rgba(239, 68, 68, 0.15);
      font-size: 11px; font-family: 'Courier New', monospace;
      color: var(--text-dim); white-space: pre-wrap; word-break: break-all;
      max-height: 120px; overflow-y: auto;
    }
    .threat-card.expanded .tc-detail { display: block; }

    .no-threats {
      background: var(--green-dim); border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: var(--radius); padding: 24px; text-align: center;
      margin-bottom: 28px;
    }
    .no-threats .nt-icon { color: var(--green); margin-bottom: 8px; }
    .no-threats p { font-size: 14px; font-weight: 500; color: var(--green); }

    /* ─── All Signals Compact List ─── */
    .signal-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 28px; }
    .signal-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 13px; transition: 0.15s; cursor: pointer;
    }
    .signal-row:hover { background: var(--surface2); }
    .signal-row .sr-icon { width: 16px; height: 16px; color: var(--text-dim); flex-shrink: 0; }
    .signal-row .sr-name { flex: 1; font-weight: 500; }
    .signal-row .sr-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .sr-badge.detected { background: var(--red-dim); color: var(--red); }
    .sr-badge.safe { background: var(--green-dim); color: var(--green); }
    .signal-row .sr-chevron { width: 14px; color: var(--text-dim); transition: 0.2s; flex-shrink: 0; }
    .signal-row.open .sr-chevron { transform: rotate(180deg); }
    .sr-detail {
      display: none; padding: 8px 14px 12px 42px;
      font-size: 11px; font-family: 'Courier New', monospace;
      color: var(--text-dim); white-space: pre-wrap; word-break: break-all;
      background: var(--surface); border: 1px solid var(--border);
      border-top: 0; border-radius: 0 0 8px 8px; margin-top: -5px;
    }
    .signal-row.open + .sr-detail { display: block; }

    /* ─── Device Info Compact ─── */
    .device-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 28px;
    }
    .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .d-item { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .d-item:last-child { border: 0; }
    .d-item label { color: var(--text-dim); }
    .d-item span { font-weight: 500; text-align: right; }

    /* ─── Dev Panels ─── */
    .dev-panels {
      display: none; gap: 16px;
      grid-template-columns: 1fr 1fr; margin-bottom: 28px;
    }
    .dev-panels.show { display: grid; }
    .dev-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .dev-box h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 10px; }
    .dev-box pre { font-size: 10px; color: var(--text-dim); overflow: auto; max-height: 250px; white-space: pre-wrap; word-break: break-all; }

    /* ─── FAB Button ─── */
    .fab {
      position: fixed; bottom: 32px; right: 32px;
      padding: 14px 28px; border-radius: 999px; border: 0;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      color: white; font-weight: 700; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
      transition: 0.25s; z-index: 100; font-family: inherit;
    }
    .fab:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5); }
    .fab:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .fab svg { width: 18px; height: 18px; }

    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Loading Skeleton ─── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
      border-radius: 6px; height: 16px; width: 100px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 700px) {
      .score-hero { grid-template-columns: 1fr; }
      .device-grid { grid-template-columns: 1fr; }
      .dev-panels.show { grid-template-columns: 1fr; }
      .threat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon"><i data-lucide="shield-check" style="width:20px;height:20px;color:white"></i></div>
        <h1>Cek<span>Fraud</span></h1>
      </div>
      <div class="header-actions">
        <div class="dev-badge" id="dev-toggle">DEV</div>
      </div>
    </div>

    <!-- Score Hero -->
    <div class="score-hero">
      <div class="score-info">
        <h2>Visitor Identification</h2>
        <div class="visitor-id" id="v-id">Tekan tombol scan untuk mulai</div>
        <div class="meta-row">
          <div class="meta-item"><label>IP Address</label><span id="m-ip">-</span></div>
          <div class="meta-item"><label>Lokasi</label><span id="m-loc">-</span></div>
          <div class="meta-item"><label>Browser</label><span id="m-browser">-</span></div>
          <div class="meta-item"><label>OS</label><span id="m-os">-</span></div>
          <div class="meta-item"><label>Incognito</label><span id="m-incognito">-</span></div>
        </div>
      </div>
      <div class="score-ring">
        <div class="ring-wrap">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--border)" stroke-width="8"/>
            <circle id="score-arc" cx="60" cy="60" r="52" fill="none" stroke="var(--green)" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="326.73" stroke-dashoffset="326.73" style="transition: stroke-dashoffset 1.2s ease, stroke 0.5s;"/>
          </svg>
          <div class="ring-label">
            <div class="num" id="score-num">0</div>
            <div class="sub">Suspect</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Detected Threats -->
    <div id="threats-section">
      <div class="section-label"><span class="dot red"></span> ANCAMAN TERDETEKSI <span id="threat-count" style="color:var(--red)">(0)</span></div>
      <div id="threat-cards" class="threat-grid" style="display:none;"></div>
      <div id="no-threats" class="no-threats">
        <div class="nt-icon"><i data-lucide="shield-check" style="width:28px;height:28px"></i></div>
        <p>Belum ada pemindaian. Tekan "Scan" untuk mulai.</p>
      </div>
    </div>

    <!-- All Signals -->
    <div class="section-label" style="margin-top:4px;"><span class="dot green"></span> SEMUA SINYAL</div>
    <div id="signal-list" class="signal-list">
      <div style="text-align:center; padding: 20px; color: var(--text-dim); font-size: 13px;">
        Belum ada data sinyal
      </div>
    </div>

    <!-- Device Info -->
    <div class="section-label">DETAIL PERANGKAT</div>
    <div class="device-section">
      <div class="device-grid">
        <div>
          <div class="d-item"><label>Visitor ID</label><span id="d-vid">-</span></div>
          <div class="d-item"><label>First Seen</label><span id="d-first">-</span></div>
          <div class="d-item"><label>Last Seen</label><span id="d-last">-</span></div>
          <div class="d-item"><label>Confidence</label><span id="d-conf">-</span></div>
        </div>
        <div>
          <div class="d-item"><label>Browser</label><span id="d-browser">-</span></div>
          <div class="d-item"><label>OS</label><span id="d-os">-</span></div>
          <div class="d-item"><label>IP Address</label><span id="d-ip">-</span></div>
          <div class="d-item"><label>Replayed</label><span id="d-replay">-</span></div>
        </div>
      </div>
    </div>

    <!-- Dev Panels -->
    <div class="dev-panels" id="dev-panels">
      <div class="dev-box">
        <h4>Raw Client Response</h4>
        <pre id="raw-client">Waiting...</pre>
      </div>
      <div class="dev-box">
        <h4>Raw Server Response</h4>
        <pre id="raw-server">Waiting...</pre>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="btn-scan">
    <i data-lucide="scan" id="scan-icon"></i>
    <span id="scan-text">Scan Sekarang</span>
  </button>

  <script type="module">
    const PUBLIC_API_KEY = "H9SG1A1njPHp0bVmTDJp";
    const SECRET_API_KEY = "w2VeU6HKBpo9UcDZOoHw";
    const SERVER_BASES = ["https://api.fpjs.io","https://eu.api.fpjs.io","https://ap.api.fpjs.io"];

    lucide.createIcons();

    // ─── DOM ───
    const $ = id => document.getElementById(id);
    const setText = (id, val) => { const el = $(id); if (el) el.textContent = (val != null && val !== '') ? val : '-'; };

    // Dev toggle
    $('dev-toggle').addEventListener('click', function() {
      this.classList.toggle('active');
      $('dev-panels').classList.toggle('show');
    });

    // ─── Data Extractor ───
    function extractData(serverData) {
      const d = {
        visitorId: '-', confidence: 0, firstSeenAt: null, lastSeenAt: null,
        ip: '-', city: 'Unknown', country: 'Unknown',
        browserName: '-', browserVersion: '', os: '-', osVersion: '',
        incognito: false, bot: false, proxy: false, vpn: false,
        tampering: false, virtualMachine: false, privacySettings: false,
        developerTools: false, suspectScore: 0, replayed: false,
        rawBot: null, rawProxy: null, rawVpn: null, rawIncognito: null,
        rawTampering: null, rawVm: null, rawPrivacy: null, rawDevtools: null,
      };
      if (!serverData) return d;

      const p = serverData.products;
      if (p) {
        // Identification
        const id = p.identification?.data;
        if (id) {
          d.visitorId = id.visitorId || d.visitorId;
          d.confidence = id.confidence?.score ?? d.confidence;
          d.firstSeenAt = id.firstSeenAt?.global || null;
          d.lastSeenAt = id.lastSeenAt?.global || null;
          d.ip = id.ip || d.ip;
          d.city = id.ipLocation?.city?.name || d.city;
          d.country = id.ipLocation?.country?.name || d.country;
          d.browserName = id.browserDetails?.browserName || d.browserName;
          d.browserVersion = id.browserDetails?.browserMajorVersion || '';
          d.os = id.browserDetails?.os || d.os;
          d.osVersion = id.browserDetails?.osVersion || '';
        }
        // Botd
        const botd = p.botd?.data;
        if (botd) { d.bot = botd.bot?.result === 'bad'; d.rawBot = botd; }
        // IP Info
        const ipD = p.ipInfo?.data;
        if (ipD) {
          const v = ipD.v4 || ipD.v6 || {};
          d.ip = v.address || d.ip;
          d.city = v.geolocation?.city?.name || d.city;
          d.country = v.geolocation?.country?.name || d.country;
        }
        // Signals
        const inc = p.incognito?.data; if (inc) { d.incognito = inc.result === true; d.rawIncognito = inc; }
        const prx = p.proxy?.data; if (prx) { d.proxy = prx.result === true; d.rawProxy = prx; }
        const vpn = p.vpn?.data; if (vpn) { d.vpn = vpn.result === true; d.rawVpn = vpn; }
        const tamp = p.tampering?.data; if (tamp) { d.tampering = tamp.result === true; d.rawTampering = tamp; }
        const vm = p.virtualMachine?.data; if (vm) { d.virtualMachine = vm.result === true; d.rawVm = vm; }
        const ss = p.suspectScore?.data; if (ss) d.suspectScore = ss.result ?? 0;
        const priv = p.privacySettings?.data; if (priv) { d.privacySettings = priv.result === true; d.rawPrivacy = priv; }
        const devt = p.developerTools?.data; if (devt) { d.developerTools = devt.result === true; d.rawDevtools = devt; }
      }

      // Flat v4 structure fallback
      if (!p) {
        const e = serverData;
        if (e.identification) {
          d.visitorId = e.identification.visitor_id || e.identification.visitorId || d.visitorId;
          d.confidence = e.identification.confidence?.score ?? d.confidence;
        }
        if (e.visitor_id) d.visitorId = e.visitor_id;
        if (e.ip_address) d.ip = e.ip_address;
        if (e.browser_details) {
          d.browserName = e.browser_details.browser_name || d.browserName;
          d.browserVersion = e.browser_details.browser_major_version || '';
          d.os = e.browser_details.os || d.os;
          d.osVersion = e.browser_details.os_version || '';
        }
        if (e.ip_info) {
          const v = e.ip_info.v4 || e.ip_info.v6 || {};
          d.ip = v.address || d.ip;
          d.city = v.geolocation?.city?.name || d.city;
          d.country = v.geolocation?.country?.name || d.country;
        }
        d.bot = e.bot === 'bad'; d.rawBot = { result: e.bot };
        d.proxy = e.proxy === true; d.rawProxy = { result: e.proxy };
        d.vpn = e.vpn === true; d.rawVpn = { result: e.vpn };
        d.incognito = e.incognito === true; d.rawIncognito = { result: e.incognito };
        d.tampering = typeof e.tampering === 'object' ? e.tampering?.result === true : e.tampering === true;
        d.rawTampering = e.tampering;
        d.virtualMachine = e.virtual_machine === true; d.rawVm = { result: e.virtual_machine };
        d.suspectScore = e.suspect_score ?? 0;
        d.privacySettings = e.privacy_settings === true; d.rawPrivacy = { result: e.privacy_settings };
        d.developerTools = e.developer_tools === true; d.rawDevtools = { result: e.developer_tools };
      }
      return d;
    }

    // ─── Signal Config ───
    const SIGNALS = [
      { key: 'bot', name: 'Bot', icon: 'bot', rawKey: 'rawBot' },
      { key: 'proxy', name: 'Proxy', icon: 'server', rawKey: 'rawProxy' },
      { key: 'vpn', name: 'VPN', icon: 'shield', rawKey: 'rawVpn' },
      { key: 'incognito', name: 'Incognito', icon: 'glasses', rawKey: 'rawIncognito' },
      { key: 'tampering', name: 'Tampering', icon: 'wrench', rawKey: 'rawTampering' },
      { key: 'virtualMachine', name: 'Virtual Machine', icon: 'monitor', rawKey: 'rawVm' },
      { key: 'privacySettings', name: 'Privacy Settings', icon: 'lock', rawKey: 'rawPrivacy' },
      { key: 'developerTools', name: 'Developer Tools', icon: 'code-2', rawKey: 'rawDevtools' },
    ];

    // ─── Render Functions ───
    function renderScore(score) {
      const num = $('score-num');
      const arc = $('score-arc');
      num.textContent = score;
      const circumference = 2 * Math.PI * 52; // 326.73
      const offset = circumference - (score / 100) * circumference;
      arc.style.strokeDashoffset = offset;
      arc.style.stroke = score > 50 ? 'var(--red)' : score > 20 ? 'var(--orange)' : 'var(--green)';
      num.style.color = score > 50 ? 'var(--red)' : score > 20 ? 'var(--orange)' : 'var(--green)';
    }

    function renderThreats(data) {
      const detected = SIGNALS.filter(s => data[s.key]);
      const container = $('threat-cards');
      const noThreats = $('no-threats');
      setText('threat-count', `(${detected.length})`);

      if (detected.length === 0) {
        container.style.display = 'none';
        noThreats.style.display = 'block';
        noThreats.innerHTML = `
          <div class="nt-icon"><i data-lucide="shield-check" style="width:28px;height:28px"></i></div>
          <p>Tidak ada ancaman terdeteksi — aman!</p>
        `;
        lucide.createIcons();
        return;
      }

      noThreats.style.display = 'none';
      container.style.display = 'grid';
      container.innerHTML = '';

      detected.forEach(sig => {
        const card = document.createElement('div');
        card.className = 'threat-card';
        const rawData = data[sig.rawKey];
        card.innerHTML = `
          <div class="tc-icon"><i data-lucide="${sig.icon}" style="width:18px;height:18px"></i></div>
          <div class="tc-name">${sig.name}</div>
          <div class="tc-status">⚠ Detected</div>
          <div class="tc-detail">${JSON.stringify(rawData, null, 2)}</div>
        `;
        card.addEventListener('click', () => card.classList.toggle('expanded'));
        container.appendChild(card);
      });
      lucide.createIcons();
    }

    function renderSignalList(data) {
      const list = $('signal-list');
      list.innerHTML = '';

      SIGNALS.forEach(sig => {
        const detected = data[sig.key];
        const rawData = data[sig.rawKey];

        const row = document.createElement('div');
        row.className = 'signal-row';
        row.innerHTML = `
          <i data-lucide="${sig.icon}" class="sr-icon"></i>
          <span class="sr-name">${sig.name}</span>
          <span class="sr-badge ${detected ? 'detected' : 'safe'}">${detected ? 'Detected' : 'Safe'}</span>
          <i data-lucide="chevron-down" class="sr-chevron"></i>
        `;

        const detail = document.createElement('div');
        detail.className = 'sr-detail';
        detail.textContent = JSON.stringify(rawData, null, 2);

        row.addEventListener('click', () => {
          row.classList.toggle('open');
        });

        list.appendChild(row);
        list.appendChild(detail);
      });
      lucide.createIcons();
    }

    function updateUI(data) {
      // Hero
      setText('v-id', data.visitorId);
      setText('m-ip', data.ip);
      setText('m-loc', `${data.city}, ${data.country}`);
      setText('m-browser', `${data.browserName} ${data.browserVersion}`.trim());
      setText('m-os', `${data.os} ${data.osVersion}`.trim());
      setText('m-incognito', data.incognito ? 'Ya' : 'Tidak');

      // Score
      renderScore(data.suspectScore);

      // Threats
      renderThreats(data);

      // All signals
      renderSignalList(data);

      // Device details
      setText('d-vid', data.visitorId);
      if (data.firstSeenAt) setText('d-first', new Date(data.firstSeenAt).toLocaleString('id-ID'));
      else setText('d-first', 'Baru saja');
      if (data.lastSeenAt) setText('d-last', new Date(data.lastSeenAt).toLocaleString('id-ID'));
      else setText('d-last', '-');
      const conf = typeof data.confidence === 'number'
        ? (data.confidence <= 1 ? (data.confidence * 100).toFixed(0) : data.confidence) : 0;
      setText('d-conf', `${conf}%`);
      setText('d-browser', `${data.browserName} ${data.browserVersion}`.trim());
      setText('d-os', `${data.os} ${data.osVersion}`.trim());
      setText('d-ip', data.ip);
      setText('d-replay', data.replayed ? 'Yes' : 'No');
    }

    // ─── API ───
    async function createAgent() {
      const FP = await import(`https://fpjscdn.net/v4/${PUBLIC_API_KEY}`);
      try { return await FP.start(); } catch(e) {}
      for (const r of ['us','eu','ap']) { try { return await FP.start({region:r}); } catch(e) {} }
      throw new Error('Agent gagal diinisialisasi');
    }

    async function fetchServer(eventId) {
      for (const base of SERVER_BASES) {
        try {
          const r = await fetch(`${base}/v4/events/${eventId}`, {
            headers: { Authorization: `Bearer ${SECRET_API_KEY}`, Accept: 'application/json' }
          });
          if (r.ok) return await r.json();
        } catch(e) {}
      }
      throw new Error('Server API tidak merespon');
    }

    const fpPromise = createAgent();

    $('btn-scan').addEventListener('click', async () => {
      const btn = $('btn-scan');
      btn.disabled = true;
      $('scan-text').textContent = 'Scanning...';
      $('scan-icon').classList.add('animate-spin');

      try {
        const fp = await fpPromise;
        const result = await fp.get();
        console.log('[Client]', result);
        $('raw-client').textContent = JSON.stringify(result, null, 2);

        let serverData;
        try {
          const eid = result.requestId || result.event_id;
          serverData = await fetchServer(eid);
          console.log('[Server]', serverData);
          $('raw-server').textContent = JSON.stringify(serverData, null, 2);
        } catch(e) {
          console.error('[Server Error]', e);
          $('raw-server').textContent = 'Error: ' + e.message;
          return;
        }

        const data = extractData(serverData);
        if (data.visitorId === '-' && result.visitorId) data.visitorId = result.visitorId;
        console.log('[Extracted]', data);

        updateUI(data);
        $('scan-text').textContent = 'Scan Ulang';
      } catch (err) {
        console.error('[Error]', err);
        alert('Error: ' + err.message);
        $('scan-text').textContent = 'Coba Lagi';
      } finally {
        btn.disabled = false;
        $('scan-icon').classList.remove('animate-spin');
      }
    });
  </script>
</body>
</html>
