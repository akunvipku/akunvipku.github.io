<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Aktivitas - VIPCore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            animation: cardEntrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--primary);
            font-size: 32px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--glass-border);
        }

        .diff-container {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .diff-header {
            display: grid;
            grid-template-columns: 140px 1fr 1fr;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .diff-row {
            display: grid;
            grid-template-columns: 140px 1fr 1fr;
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 14px;
            align-items: start;
            transition: background 0.2s;
        }

        .diff-row:last-child {
            border-bottom: none;
        }

        .diff-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .label {
            color: var(--text-muted);
            font-weight: 500;
            word-break: break-all;
            padding-right: 10px;
        }

        .val {
            word-break: break-word;
            /* Ensure long text wraps */
            padding: 4px 8px;
            border-radius: 6px;
            line-height: 1.5;
        }

        .val-old {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .val-new {
            color: #86efac;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .val-same {
            color: var(--text-main);
            opacity: 0.8;
        }

        .footer-action {
            margin-top: 30px;
            text-align: center;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);
        }

        .btn-back:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        /* Loading & Error States */
        .state-box {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .error-box {
            color: var(--danger);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-insert {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .badge-update {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .badge-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        @media (max-width: 600px) {
            .diff-header {
                display: none;
            }

            .diff-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .label {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 2px;
            }

            .val-old::before {
                content: 'LAMA: ';
                font-size: 10px;
                opacity: 0.7;
                display: block;
            }

            .val-new::before {
                content: 'BARU: ';
                font-size: 10px;
                opacity: 0.7;
                display: block;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="icon-wrapper">
                    <i class="fas fa-database"></i>
                </div>
                <h1>Log Aktivitas Database</h1>
                <div id="metaInfo" class="meta-info">
                    <!-- Meta tags will be injected here -->
                    <span class="meta-tag"><i class="fas fa-spinner fa-spin"></i> Memuat detail...</span>
                </div>
            </div>

            <div id="diffContent" class="diff-container">
                <!-- Content -->
            </div>

            <div class="footer-action">
                <a href="../apps/dbm/index.php" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawData = urlParams.get('data');

            if (!rawData) {
                renderError('Token data tidak valid atau kadaluarsa.');
                return;
            }

            try {
                // Robust Base64 Decoding (handling Unicode)
                const jsonStr = decodeURIComponent(escape(window.atob(rawData)));
                const payload = JSON.parse(jsonStr);
                render(payload);
            } catch (e) {
                console.error('Decoding failed:', e);
                renderError('Gagal membaca data log. Struktur data rusak.');
            }
        });

        function render(data) {
            const metaInfo = document.getElementById('metaInfo');
            const diffContent = document.getElementById('diffContent');
            const action = (data.action || 'unknown').toLowerCase();

            // 1. Render Meta
            let badgeClass = 'badge-update';
            let actionLabel = 'UPDATE';
            if (action === 'insert') { badgeClass = 'badge-insert'; actionLabel = 'INSERT'; }
            if (action === 'delete') { badgeClass = 'badge-delete'; actionLabel = 'DELETE'; }

            metaInfo.innerHTML = `
            <span class="meta-tag ${badgeClass}" style="border:none;">${actionLabel}</span>
            <span class="meta-tag"><i class="fas fa-table"></i> ${data.table || '-'}</span>
            <span class="meta-tag"><i class="fas fa-user"></i> ${data.user || 'System'}</span>
            <span class="meta-tag"><i class="far fa-clock"></i> ${data.time || '-'}</span>
        `;

            // 2. Render Diff Table
            let html = '';

            if (action === 'insert') {
                html += `<div class="diff-header" style="grid-template-columns: 140px 1fr;"><div>Kolom</div><div>Nilai Data Baru</div></div>`;
                const newData = data.data || {};
                for (const [key, val] of Object.entries(newData)) {
                    html += `
                    <div class="diff-row" style="grid-template-columns: 140px 1fr;">
                        <div class="label">${key}</div>
                        <div class="val val-new">${safe(val)}</div>
                    </div>
                `;
                }
            }
            else if (action === 'delete') {
                html += `<div class="diff-header" style="grid-template-columns: 140px 1fr;"><div>Kolom</div><div>Data yang Dihapus</div></div>`;
                const oldData = data.old || {};
                for (const [key, val] of Object.entries(oldData)) {
                    html += `
                    <div class="diff-row" style="grid-template-columns: 140px 1fr;">
                        <div class="label">${key}</div>
                        <div class="val val-old">${safe(val)}</div>
                    </div>
                `;
                }
            }
            else {
                // Update
                html += `<div class="diff-header"><div>Kolom</div><div>Data Lama</div><div>Data Baru</div></div>`;
                const oldData = data.old || {};
                const newData = data.new || {};

                // Get all unique keys
                const allKeys = new Set([...Object.keys(oldData), ...Object.keys(newData)]);

                allKeys.forEach(key => {
                    const valOld = oldData[key];
                    const valNew = newData[key];
                    const isChanged = String(valOld) !== String(valNew);

                    if (isChanged) {
                        html += `
                        <div class="diff-row">
                            <div class="label">${key}</div>
                            <div class="val val-old">${safe(valOld)}</div>
                            <div class="val val-new">${safe(valNew)}</div>
                        </div>
                    `;
                    } else {
                        // Optional: Hide unchanged fields or show them dimmed?
                        // Showing them dimmed for context
                        html += `
                        <div class="diff-row">
                            <div class="label">${key}</div>
                            <div class="val val-same" style="grid-column: 2 / -1;">${safe(valNew)}</div>
                        </div>
                    `;
                    }
                });
            }

            diffContent.innerHTML = html;
        }

        function renderError(msg) {
            document.getElementById('diffContent').innerHTML = `
            <div class="state-box error-box">
                <i class="fas fa-bug fa-3x" style="margin-bottom:15px;"></i>
                <p>${msg}</p>
            </div>
        `;
            document.getElementById('metaInfo').innerHTML = '';
        }

        function safe(str) {
            if (str === null || str === undefined) return '<i style="opacity:0.5">NULL</i>';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>

</body>

</html>
